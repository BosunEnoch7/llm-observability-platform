name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests scripts
      - run: ruff format --check app tests scripts
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85
      - run: docker compose config --quiet

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: llm-observability-platform:test

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Bicep templates
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infra/bicep/foundation.bicep --stdout > /dev/null
            az bicep build --file infra/bicep/app.bicep --stdout > /dev/null
            az bicep build-params --file infra/bicep/foundation.dev.bicepparam --stdout > /dev/null
